spring:
  application:
    name: library-management

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DB_USER:library}
    password: ${DB_PASSWORD:library}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 минут

  async:
    executor:
      core-pool-size: 2
      max-pool-size: 5

app:
  jwt:
    secret: ${JWT_SECRET:very-long-secret-key-for-library-management-system-minimum-256-bits}
    expiration-ms: 86400000       # 24 часа
    refresh-expiration-ms: 604800000  # 7 дней

  fine:
    rate-per-day: 10.0            # рублей в день за просрочку

  loan:
    default-duration-days: 14    # стандартный срок выдачи
    max-active-loans: 5

  scheduler:
    overdue-check-cron: "0 */30 * * * *"  # каждые 30 минут

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.library: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.web: DEBUG
